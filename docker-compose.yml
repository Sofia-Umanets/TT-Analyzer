# Базовая конфигурация (CPU) — работает на любой машине без nvidia-container-toolkit.
#
# Сборка:       docker compose build
# Запуск:       docker compose up -d
# Запуск GPU:   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  backend:
    build: .
    image: tt-analyzer:latest
    pull_policy: never        
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./storage:/app/storage
      - ./outputs:/app/outputs
    environment:
      PYTHONPATH: /app
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
